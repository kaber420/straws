<!DOCTYPE html>
<html lang="en" style="width: 380px; min-height: 480px;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="appName">Straws Proxy</title>
    <link rel="stylesheet" href="ui/css/base.css">
</head>
<body class="widget-container">
    <!-- Header Pill -->
    <div class="glass-pill" style="justify-content: space-between; margin-bottom: 8px;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981;"></div>
            <h2 data-i18n="appName" style="margin:0; font-size: 0.9rem; letter-spacing: 0.05em; text-transform: uppercase;">STRAWS</h2>
        </div>
        <div style="display: flex; gap: 6px; align-items: center;">
            <button id="open-sidepanel" class="btn-outline" title="Open Side Panel" style="padding: 4px; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </button>
            <button class="theme-btn btn-outline" data-theme="frost" style="padding: 4px 8px; font-size: 0.6rem; border-radius: 8px;">Frost</button>
            <button class="theme-btn btn-outline" data-theme="neo" style="padding: 4px 8px; font-size: 0.6rem; border-radius: 8px;">Neo</button>
        </div>
    </div>
    
    <!-- Dynamic Straw List -->
    <div id="strawList"></div>

    <!-- Quick Add Section -->
    <div class="glass-bubble" style="padding: 16px; display: flex; flex-direction: column; gap: 12px; background: rgba(0,0,0,0.15);">
        <h3 data-i18n="addStraw" style="margin: 0; font-size: 0.7rem; opacity: 0.5; font-weight: 800; letter-spacing: 0.05em;">ADD STRAW</h3>
        
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <input type="text" id="hostInput" data-i18n-placeholder="Domain (e.g., local.kbr)" placeholder="Domain (e.g., local.kbr)">
            <input type="text" id="targetInput" data-i18n-placeholder="Target (e.g., localhost:8000)" placeholder="Target (e.g., localhost:8000)">
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 4px;">
                <span style="font-size: 0.65rem; font-weight: 800; opacity: 0.4;">HEADERS</span>
                <button id="addHeaderBtn" class="btn btn-outline" style="padding: 4px 10px; font-size: 0.6rem; border-radius: 8px;">+ Add</button>
            </div>
            
            <div id="headerList" style="display: flex; flex-direction: column; gap: 8px;"></div>

            <div style="display: flex; flex-wrap: wrap; gap: 6px;">
                <button class="preset-btn btn btn-outline" data-type="bearer" style="font-size: 0.6rem; padding: 4px 8px; border-radius: 8px;">🔑 Bearer</button>
                <button class="preset-btn btn btn-outline" data-type="basic" style="font-size: 0.6rem; padding: 4px 8px; border-radius: 8px;">👤 Basic</button>
                <button class="preset-btn btn btn-outline" data-type="debug" style="font-size: 0.6rem; padding: 4px 8px; border-radius: 8px;">🐞 Debug</button>
            </div>

            <button id="addStrawBtn" data-i18n="activateStraws" class="btn btn-primary" style="margin-top: 4px;">Activate Straws</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="ui/js/storage.js"></script>
    <script src="ui/js/theme_engine.js"></script>
    <script src="ui/js/ui.js"></script>
</body>
</html>
